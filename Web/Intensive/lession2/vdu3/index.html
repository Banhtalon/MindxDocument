<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bảng Điểm Học Kỳ</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0e1a;
        --surface: #111827;
        --surface2: #1a2235;
        --border: #1e2d45;
        --accent: #f97316;
        --accent2: #fb923c;
        --gold: #fbbf24;
        --silver: #94a3b8;
        --bronze: #cd7c3e;
        --green: #34d399;
        --red: #f87171;
        --blue: #60a5fa;
        --purple: #a78bfa;
        --text: #e2e8f0;
        --text-muted: #64748b;
        --text-dim: #94a3b8;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Be Vietnam Pro", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* Background grid */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(249, 115, 22, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(249, 115, 22, 0.03) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
        z-index: 0;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 24px;
        position: relative;
        z-index: 1;
      }

      /* HEADER */
      header {
        padding: 32px 0 24px;
        border-bottom: 1px solid var(--border);
        margin-bottom: 40px;
      }

      .header-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
      }

      .logo-area {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .logo-icon {
        width: 48px;
        height: 48px;
        background: linear-gradient(135deg, var(--accent), #ef4444);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        box-shadow: 0 0 24px rgba(249, 115, 22, 0.35);
      }

      h1 {
        font-size: 22px;
        font-weight: 800;
        letter-spacing: -0.5px;
      }

      h1 span {
        color: var(--accent);
      }

      .subtitle {
        font-size: 12px;
        color: var(--text-muted);
        font-family: "Space Mono", monospace;
        margin-top: 2px;
      }

      .stats-bar {
        display: flex;
        gap: 24px;
        flex-wrap: wrap;
      }

      .stat-chip {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
      }

      .stat-num {
        font-size: 20px;
        font-weight: 800;
        font-family: "Space Mono", monospace;
        color: var(--accent);
      }

      .stat-label {
        font-size: 10px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      /* TASK CARDS */
      .tasks-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px;
        margin-bottom: 40px;
      }

      .task-btn {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px 18px;
        cursor: pointer;
        transition: all 0.2s ease;
        text-align: left;
        position: relative;
        overflow: hidden;
      }

      .task-btn::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 3px;
        background: var(--accent);
        transform: scaleY(0);
        transition: transform 0.2s ease;
        border-radius: 0 2px 2px 0;
      }

      .task-btn:hover {
        border-color: var(--accent);
        transform: translateY(-2px);
        background: var(--surface2);
      }
      .task-btn:hover::before {
        transform: scaleY(1);
      }
      .task-btn.active {
        border-color: var(--accent);
        background: var(--surface2);
      }
      .task-btn.active::before {
        transform: scaleY(1);
      }

      .task-num {
        font-size: 10px;
        font-family: "Space Mono", monospace;
        color: var(--accent);
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .task-title {
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
        line-height: 1.4;
      }

      /* OUTPUT PANEL */
      #output {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        min-height: 200px;
        overflow: hidden;
        animation: fadeIn 0.3s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .panel-header {
        padding: 16px 24px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: var(--surface2);
      }

      .panel-title {
        font-size: 13px;
        font-weight: 700;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 1.5px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .panel-title .dot {
        width: 8px;
        height: 8px;
        background: var(--accent);
        border-radius: 50%;
        box-shadow: 0 0 8px var(--accent);
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }

      .panel-body {
        padding: 24px;
      }

      /* STUDENT CARDS */
      .student-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .student-card {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px 20px;
        display: flex;
        align-items: center;
        gap: 16px;
        transition: all 0.2s ease;
        animation: slideIn 0.3s ease both;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(-12px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      .student-card:hover {
        border-color: rgba(249, 115, 22, 0.3);
        transform: translateX(4px);
      }

      .rank-badge {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Space Mono", monospace;
        font-weight: 700;
        font-size: 14px;
        flex-shrink: 0;
      }

      .rank-1 {
        background: rgba(251, 191, 36, 0.15);
        color: var(--gold);
        border: 1px solid rgba(251, 191, 36, 0.3);
      }
      .rank-2 {
        background: rgba(148, 163, 184, 0.15);
        color: var(--silver);
        border: 1px solid rgba(148, 163, 184, 0.3);
      }
      .rank-3 {
        background: rgba(205, 124, 62, 0.15);
        color: var(--bronze);
        border: 1px solid rgba(205, 124, 62, 0.3);
      }
      .rank-default {
        background: rgba(96, 165, 250, 0.1);
        color: var(--blue);
        border: 1px solid rgba(96, 165, 250, 0.2);
      }

      .student-info {
        flex: 1;
      }

      .student-name {
        font-size: 15px;
        font-weight: 700;
        margin-bottom: 3px;
      }

      .student-detail {
        font-size: 12px;
        color: var(--text-muted);
        font-family: "Space Mono", monospace;
      }

      .score-badge {
        font-family: "Space Mono", monospace;
        font-size: 18px;
        font-weight: 700;
        padding: 6px 14px;
        border-radius: 8px;
      }

      .score-excellent {
        background: rgba(52, 211, 153, 0.12);
        color: var(--green);
        border: 1px solid rgba(52, 211, 153, 0.25);
      }
      .score-good {
        background: rgba(96, 165, 250, 0.12);
        color: var(--blue);
        border: 1px solid rgba(96, 165, 250, 0.25);
      }
      .score-average {
        background: rgba(251, 191, 36, 0.12);
        color: var(--gold);
        border: 1px solid rgba(251, 191, 36, 0.25);
      }
      .score-below {
        background: rgba(248, 113, 113, 0.12);
        color: var(--red);
        border: 1px solid rgba(248, 113, 113, 0.25);
      }

      /* BIG STAT */
      .big-stat {
        display: flex;
        align-items: center;
        gap: 24px;
        padding: 24px;
      }

      .big-number {
        font-size: 64px;
        font-weight: 800;
        font-family: "Space Mono", monospace;
        line-height: 1;
      }

      .big-label {
        font-size: 14px;
        color: var(--text-muted);
        margin-top: 6px;
      }

      /* CLASSIFICATION */
      .classification-list {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .class-group {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
      }

      .class-header {
        padding: 12px 18px;
        display: flex;
        align-items: center;
        gap: 12px;
        border-bottom: 1px solid var(--border);
      }

      .class-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      .class-name {
        font-weight: 700;
        font-size: 14px;
      }

      .class-count {
        margin-left: auto;
        font-family: "Space Mono", monospace;
        font-size: 12px;
        color: var(--text-muted);
      }

      .class-body {
        padding: 12px 18px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .name-tag {
        padding: 4px 10px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--border);
        border-radius: 6px;
        font-size: 13px;
        font-weight: 500;
      }

      /* TABLE */
      .score-table-wrap {
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }

      thead th {
        padding: 10px 14px;
        text-align: left;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.8px;
        font-size: 11px;
        font-family: "Space Mono", monospace;
        border-bottom: 1px solid var(--border);
      }

      tbody tr {
        border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        transition: background 0.15s;
        animation: slideIn 0.3s ease both;
      }

      tbody tr:hover {
        background: rgba(255, 255, 255, 0.03);
      }

      tbody td {
        padding: 11px 14px;
        vertical-align: middle;
      }

      .empty-state {
        padding: 48px 24px;
        text-align: center;
        color: var(--text-muted);
      }

      .empty-state .icon {
        font-size: 40px;
        margin-bottom: 12px;
      }
      .empty-state p {
        font-size: 14px;
      }

      /* Progress bar */
      .progress-bar {
        height: 4px;
        background: var(--border);
        border-radius: 2px;
        margin-top: 4px;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        border-radius: 2px;
        transition: width 0.6s ease;
      }

      /* Responsive */
      @media (max-width: 600px) {
        .tasks-grid {
          grid-template-columns: 1fr 1fr;
        }
        .big-number {
          font-size: 48px;
        }
        .stats-bar {
          gap: 16px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <div class="header-inner">
          <div class="logo-area">
            <div class="logo-icon">📊</div>
            <div>
              <h1>Điểm <span>TBHK</span></h1>
              <div class="subtitle">// STUDENT GRADE MANAGEMENT SYSTEM</div>
            </div>
          </div>
          <div class="stats-bar">
            <div class="stat-chip">
              <div class="stat-num" id="totalStudents">10</div>
              <div class="stat-label">Học Sinh</div>
            </div>
            <div class="stat-chip">
              <div class="stat-num" id="totalSubjects">9</div>
              <div class="stat-label">Môn Học</div>
            </div>
            <div class="stat-chip">
              <div class="stat-num" id="classAvgDisplay">—</div>
              <div class="stat-label">TB Lớp</div>
            </div>
          </div>
        </div>
      </header>

      <div class="tasks-grid">
        <button class="task-btn" onclick="runTask(1, this)">
          <div class="task-num">Yêu cầu 01</div>
          <div class="task-title">Top 3 điểm TBHK cao nhất</div>
        </button>
        <button class="task-btn" onclick="runTask(2, this)">
          <div class="task-num">Yêu cầu 02</div>
          <div class="task-title">Học sinh điểm TBHK thấp nhất</div>
        </button>
        <button class="task-btn" onclick="runTask(3, this)">
          <div class="task-num">Yêu cầu 03</div>
          <div class="task-title">Điểm trung bình HK toàn lớp</div>
        </button>
        <button class="task-btn" onclick="runTask(4, this)">
          <div class="task-num">Yêu cầu 04</div>
          <div class="task-title">Danh hiệu: Giỏi — Khá — Trung Bình</div>
        </button>
        <button class="task-btn" onclick="runTask(5, this)">
          <div class="task-num">Yêu cầu 05</div>
          <div class="task-title">Lọc học sinh TBHK ≥ 7</div>
        </button>
      </div>

      <div id="output">
        <div class="empty-state">
          <div class="icon">🎯</div>
          <p>Chọn một yêu cầu ở trên để xem kết quả</p>
        </div>
      </div>
    </div>

    <script>
      const students = [
        {
          name: "An",
          scores: {

            NguVan: { score: 8.9, evaluation: "Đ" },
            NgoaiNgu: { score: 8.5, evaluation: "Đ" },
            VatLy: { score: 9.0, evaluation: "Đ" },
            HoaHoc: { score: 3.9, evaluation: "KĐ" },
            SinhHoc: { score: 5.0, evaluation: "Đ" },
            LichSu: { score: 8.3, evaluation: "Đ" },
            DiaLy: { score: 9.4, evaluation: "Đ" },
            GDCD: { score: 6.6, evaluation: "Đ" },
          },
        },
        {
          name: "Binh",
          scores: {
            Toan: { score: 3.4, evaluation: "KĐ" },
            NguVan: { score: 5.9, evaluation: "Đ" },
            NgoaiNgu: { score: 5.4, evaluation: "Đ" },
            VatLy: { score: 7.4, evaluation: "Đ" },
            HoaHoc: { score: 9.3, evaluation: "Đ" },
            SinhHoc: { score: 8.6, evaluation: "Đ" },
            LichSu: { score: 5.2, evaluation: "Đ" },

            VatLy: { score: 6.8, evaluation: "Đ" },
            HoaHoc: { score: 8.0, evaluation: "Đ" },
            SinhHoc: { score: 7.5, evaluation: "Đ" },
            LichSu: { score: 9.2, evaluation: "Đ" },
            DiaLy: { score: 8.8, evaluation: "Đ" },
            GDCD: { score: 7.9, evaluation: "Đ" },
          },
        },
        {
          name: "Duc",
          scores: {
            Toan: { score: 6.0, evaluation: "Đ" },
            NguVan: { score: 4.5, evaluation: "Đ" },
            NgoaiNgu: { score: 7.0, evaluation: "Đ" },
            VatLy: { score: 5.5, evaluation: "Đ" },
            HoaHoc: { score: 6.5, evaluation: "Đ" },
            SinhHoc: { score: 4.0, evaluation: "Đ" },
            LichSu: { score: 7.8, evaluation: "Đ" },
            DiaLy: { score: 6.2, evaluation: "Đ" },
            GDCD: { score: 5.8, evaluation: "Đ" },
          },
        },
        {
          name: "Em",
          scores: {
            Toan: { score: 9.5, evaluation: "Đ" },
            NguVan: { score: 9.0, evaluation: "Đ" },
            NgoaiNgu: { score: 9.3, evaluation: "Đ" },
            VatLy: { score: 8.7, evaluation: "Đ" },
            HoaHoc: { score: 9.1, evaluation: "Đ" },

        },

        },

        },
        {

          },
        },
        {

          scores: {

            NguVan: { score: 7.5, evaluation: "Đ" },
            NgoaiNgu: { score: 8.8, evaluation: "Đ" },

            LichSu: { score: 7.3, evaluation: "Đ" },
            DiaLy: { score: 8.6, evaluation: "Đ" },
            GDCD: { score: 8.0, evaluation: "Đ" },
          },
        },
        {
          name: "Kim",
          scores: {
            Toan: { score: 6.5, evaluation: "Đ" },
            NguVan: { score: 7.0, evaluation: "Đ" },
            NgoaiNgu: { score: 5.8, evaluation: "Đ" },
            VatLy: { score: 6.9, evaluation: "Đ" },
            HoaHoc: { score: 7.4, evaluation: "Đ" },
            SinhHoc: { score: 6.1, evaluation: "Đ" },
            LichSu: { score: 7.7, evaluation: "Đ" },
            DiaLy: { score: 6.8, evaluation: "Đ" },
            GDCD: { score: 7.3, evaluation: "Đ" },
          },
        },
      ];

      function getAvg(student) {
        const vals = Object.values(student.scores).map((s) => s.score);
        return (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(2);
      }

      function getScoreClass(score) {
        if (score >= 8) return "score-excellent";
        if (score >= 6.5) return "score-good";
        if (score >= 5) return "score-average";
        return "score-below";
      }

      function getRankClass(i) {
        return ["rank-1", "rank-2", "rank-3"][i] || "rank-default";
      }

      function classify(avg) {
        if (avg >= 8) return "Giỏi";
        if (avg >= 6.5) return "Khá";
        if (avg >= 5) return "Trung Bình";
        return "Yếu";
      }

      // Precompute class avg
      const allAvgs = students.map((s) => parseFloat(getAvg(s)));
      const classAvg = (
        allAvgs.reduce((a, b) => a + b, 0) / allAvgs.length
      ).toFixed(2);
      document.getElementById("classAvgDisplay").textContent = classAvg;

      function setOutput(html) {
        document.getElementById("output").innerHTML = html;
      }

      function runTask(n, btn) {
        document
          .querySelectorAll(".task-btn")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");

        const sorted = [...students]
          .map((s) => ({ ...s, avg: parseFloat(getAvg(s)) }))
          .sort((a, b) => b.avg - a.avg);

        if (n === 1) {
          const top3 = sorted.slice(0, 3);
          setOutput(`
      <div class="panel-header">
        <div class="panel-title"><span class="dot"></span>Top 3 học sinh điểm cao nhất</div>
        <span style="font-size:12px;color:var(--text-muted);font-family:'Space Mono',monospace">3 / ${students.length}</span>
      </div>
      <div class="panel-body">
        <div class="student-list">
          ${top3
            .map(
              (s, i) => `
            <div class="student-card" style="animation-delay:${i * 0.07}s">
              <div class="rank-badge ${getRankClass(i)}">${["🥇", "🥈", "🥉"][i]}</div>
              <div class="student-info">
                <div class="student-name">${s.name}</div>
                <div class="student-detail">Hạng ${i + 1} · ${Object.keys(s.scores).length} môn học</div>
              </div>
              <div class="score-badge ${getScoreClass(s.avg)}">${s.avg}</div>
            </div>`,
            )
            .join("")}
        </div>
      </div>`);
        } else if (n === 2) {
          const last = sorted[sorted.length - 1];
          const color = getScoreClass(last.avg);
          setOutput(`
      <div class="panel-header">
        <div class="panel-title"><span class="dot"></span>Học sinh điểm TBHK thấp nhất</div>
      </div>
      <div class="panel-body">
        <div class="big-stat">
          <div>
            <div class="big-number" style="color:var(--red)">${last.avg}</div>
            <div class="big-label">Điểm Trung Bình Học Kỳ</div>
          </div>
          <div style="flex:1">
            <div class="student-card" style="max-width:340px">
              <div class="rank-badge rank-default">📉</div>
              <div class="student-info">
                <div class="student-name">${last.name}</div>
                <div class="student-detail">Xếp thứ ${sorted.length} / ${students.length}</div>
                <div class="progress-bar" style="margin-top:8px;width:200px">
                  <div class="progress-fill" style="width:${last.avg * 10}%;background:var(--red)"></div>
                </div>
              </div>
            </div>
            <div style="margin-top:16px">
              <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px;font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:1px">Chi tiết các môn</div>
              <div class="score-table-wrap">
                <table>
                  <thead><tr><th>Môn</th><th>Điểm</th><th>KQ</th></tr></thead>
                  <tbody>
                    ${Object.entries(last.scores)
                      .map(
                        ([sub, d]) => `
                      <tr>
                        <td>${sub}</td>
                        <td><span class="score-badge ${getScoreClass(d.score)}" style="font-size:12px;padding:3px 8px">${d.score}</span></td>
                        <td style="color:${d.evaluation === "Đ" ? "var(--green)" : "var(--red)"}">${d.evaluation}</td>
                      </tr>`,
                      )
                      .join("")}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>`);
        } else if (n === 3) {
          setOutput(`
      <div class="panel-header">
        <div class="panel-title"><span class="dot"></span>Điểm trung bình HK toàn lớp</div>
        <span style="font-size:12px;color:var(--text-muted);font-family:'Space Mono',monospace">${students.length} học sinh</span>
      </div>
      <div class="panel-body">
        <div class="big-stat" style="margin-bottom:24px">
          <div>
            <div class="big-number" style="color:var(--accent)">${classAvg}</div>
            <div class="big-label">Điểm TBHK Toàn Lớp · ${classify(classAvg)}</div>
          </div>
        </div>
        <div class="score-table-wrap">
          <table>
            <thead><tr><th>#</th><th>Học Sinh</th><th>Điểm TB</th><th>Danh Hiệu</th><th>Phân phối</th></tr></thead>
            <tbody>
              ${sorted
                .map(
                  (s, i) => `
                <tr style="animation-delay:${i * 0.04}s">
                  <td style="font-family:'Space Mono',monospace;color:var(--text-muted)">${String(i + 1).padStart(2, "0")}</td>
                  <td style="font-weight:600">${s.name}</td>
                  <td><span class="score-badge ${getScoreClass(s.avg)}" style="font-size:12px;padding:3px 10px">${s.avg}</span></td>
                  <td style="font-size:12px;color:var(--text-dim)">${classify(s.avg)}</td>
                  <td>
                    <div class="progress-bar" style="width:120px">
                      <div class="progress-fill" style="width:${s.avg * 10}%;background:${s.avg >= 8 ? "var(--green)" : s.avg >= 6.5 ? "var(--blue)" : s.avg >= 5 ? "var(--gold)" : "var(--red)"}"></div>
                    </div>
                  </td>
                </tr>`,
                )
                .join("")}
            </tbody>
          </table>
        </div>
      </div>`);
        } else if (n === 4) {
          const groups = { Giỏi: [], Khá: [], "Trung Bình": [], Yếu: [] };
          sorted.forEach((s) => groups[classify(s.avg)].push(s.name));
          const colors = {
            Giỏi: "var(--green)",
            Khá: "var(--blue)",
            "Trung Bình": "var(--gold)",
            Yếu: "var(--red)",
          };
          const icons = {
            Giỏi: "🏆",
            Khá: "⭐",
            "Trung Bình": "📘",
            Yếu: "📉",
          };
          setOutput(`
      <div class="panel-header">
        <div class="panel-title"><span class="dot"></span>Phân loại danh hiệu học lực</div>
      </div>
      <div class="panel-body">
        <div class="classification-list">
          ${Object.entries(groups)
            .map(
              ([cls, names]) => `
            <div class="class-group" style="animation:slideIn 0.3s ease">
              <div class="class-header">
                <div class="class-dot" style="background:${colors[cls]}"></div>
                <span class="class-name">${icons[cls]} ${cls}</span>
                <span class="class-count">${names.length} học sinh</span>
              </div>
              ${
                names.length
                  ? `
              <div class="class-body">
                ${names.map((n) => `<span class="name-tag">${n}</span>`).join("")}
              </div>`
                  : `<div style="padding:12px 18px;font-size:13px;color:var(--text-muted)">Không có học sinh</div>`
              }
            </div>`,
            )
            .join("")}
        </div>
      </div>`);
        } else if (n === 5) {
          const filtered = sorted.filter((s) => s.avg >= 7);
          setOutput(`
      <div class="panel-header">
        <div class="panel-title"><span class="dot"></span>Học sinh có TBHK ≥ 7</div>
        <span style="font-size:12px;color:var(--text-muted);font-family:'Space Mono',monospace">${filtered.length} / ${students.length}</span>
      </div>
      <div class="panel-body">
        <div class="student-list">
          ${filtered
            .map(
              (s, i) => `
            <div class="student-card" style="animation-delay:${i * 0.06}s">
              <div class="rank-badge ${getRankClass(i)}">
                ${i < 3 ? ["🥇", "🥈", "🥉"][i] : String(i + 1).padStart(2, "0")}
              </div>
              <div class="student-info">
                <div class="student-name">${s.name}</div>
                <div class="student-detail">${classify(s.avg)} · TB: ${s.avg}</div>
                <div class="progress-bar" style="width:180px;margin-top:6px">
                  <div class="progress-fill" style="width:${s.avg * 10}%;background:var(--green)"></div>
                </div>
              </div>
              <div class="score-badge ${getScoreClass(s.avg)}">${s.avg}</div>
            </div>`,
            )
            .join("")}
        </div>
      </div>`);
        }
      }
    </script>
  </body>
</html>
